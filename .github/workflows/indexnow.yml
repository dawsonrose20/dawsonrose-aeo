name: IndexNow ping

on:
  push:
    branches: [main]

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Give Vercel time to finish deploying the new commit before we tell Bing
      # to re-crawl. Vercel auto-deploys typically complete in ~30 seconds.
      - name: Wait for Vercel deploy
        run: sleep 60

      - name: Notify IndexNow
        run: node scripts/indexnow.mjs
